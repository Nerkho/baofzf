name: CI

on:
  pull_request:
    branches:
    - '*'
  push:
    branches:
    - main

defaults:
  run:
    shell: bash

env:
  RUSTFLAGS: --deny warnings

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Clippy
      run: cargo clippy --all --all-targets
    - name: Format
      run: cargo fmt --all -- --check

  msrv:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: 1.97.0
    - name: Check
      run: cargo check

  test:
    strategy:
      matrix:
        os:
        - ubuntu-latest
   #     - macos-latest
   #     - windows-latest
    runs-on: ${{matrix.os}}
    steps:
    - uses: actions/checkout@v6
    - name: Test
      shell: bash
      run: cargo test --all
